{% raw %}
  <div v-if="screen.with_questions && event.questions_integration" class="obs-intermission-questions-integration">
    <img :src="event.questions_integration.qr_code_url" class="obs-intermission-integration-qr">
    <span class="obs-intermission-integration-text">{{ event.questions_integration.name }}</span>
    <span class="obs-intermission-integration-url" v-if="event.questions_integration.url">{{ event.questions_integration.url }}</span>
  </div>
{% endraw %}
